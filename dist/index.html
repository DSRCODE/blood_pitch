<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide Presentation</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        /* background: #000; */
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Slide Container */
      #slide-container {
        flex: 1;
        position: relative;
      }

      /* Iframe */
      #slide-frame {
        width: 100%;
        height: 100%;
        border: none;
        background: #111;
      }

      /* Controls - Top Right */
      #controls {
        position: fixed;
        top: 10px;
        right: 20px;

        width: 90%;
        max-width: 240px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
      }

      /* Buttons */
      button {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        transition: 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.5);
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* Progress */
      #progress {
        flex: 1;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        margin: 0 20px;
        border-radius: 10px;
        overflow: hidden;
      }

      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4f46e5, #22d3ee);
        transition: width 0.3s ease;
      }

      /* Slide info */
      #slide-info {
        font-size: 12px;
        opacity: 0.7;
        color: #111;
      }

      #slide-frame {
        transition: opacity 0.3s ease;
      }
    </style>
  </head>

  <body>
    <div id="slide-container">
      <iframe id="slide-frame" src="sl1.html"></iframe>
    </div>

    <div id="controls">
      <button id="prev">←</button>

      <!-- <div id="progress">
            <div id="progress-bar"></div>
        </div> -->

      <span id="slide-info">Slide 1 of 14</span>

      <button id="next">→</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
