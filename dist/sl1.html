<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VitalGrid Cover Slide</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .slide-container {
        width: 100%;
        height: 720px;
        position: relative;
        background-color: #ffffff;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .bg-shape-1 {
        position: absolute;
        top: -150px;
        right: -100px;
        width: 600px;
        height: 600px;
        background-color: #e0f2fe; /* Light Blue */
        border-radius: 50%;
        z-index: 0;
        opacity: 0.6;
      }
      .bg-shape-2 {
        position: absolute;
        bottom: -200px;
        left: -100px;
        width: 700px;
        height: 700px;
        background-color: #f0fdf4; /* Light Green */
        border-radius: 50%;
        z-index: 0;
        opacity: 0.7;
      }
      .content-wrapper {
        flex: 1;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 60px;
        text-align: center;
      }
      .brand-logo {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 3.5rem;
        color: #0f172a; /* Slate 900 */
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .brand-icon {
        color: #ef4444; /* Red for blood/vitality */
        font-size: 3rem;
      }
      .tagline {
        font-family: "Montserrat", sans-serif;
        font-size: 1.5rem;
        color: #64748b; /* Slate 500 */
        font-weight: 400;
        letter-spacing: 1px;
        margin-bottom: 60px;
        text-transform: uppercase;
      }
      .hero-card {
        background-color: white;
        padding: 40px 60px;
        border-radius: 20px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        max-width: 900px;
        width: 100%;
        border-left: 8px solid #0ea5e9; /* Sky Blue */
      }
      .platform-name {
        font-size: 3rem;
        font-weight: 800;
        color: #0ea5e9; /* Sky Blue */
        margin-bottom: 10px;
        line-height: 1.2;
      }
      .platform-subtitle {
        font-size: 1.5rem;
        color: #334155; /* Slate 700 */
        font-weight: 500;
        margin-bottom: 25px;
      }
      .feature-pill {
        display: inline-block;
        background-color: #f1f5f9;
        padding: 8px 20px;
        border-radius: 50px;
        color: #475569;
        font-weight: 600;
        font-size: 1rem;
        margin-top: 10px;
        border: 1px solid #e2e8f0;
      }
      .footer-bar {
        background-color: #0f172a; /* Slate 900 */
        color: white;
        padding: 20px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 20;
        font-size: 0.9rem;
      }
      .pulse-circle {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: #ef4444;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.2;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <!-- Background decorative elements -->
      <div class="bg-shape-1"></div>
      <div class="bg-shape-2"></div>
      <!-- Main Content -->
      <div class="content-wrapper">
        <div class="brand-logo">
          <i class="fa-solid fa-heart-pulse brand-icon"></i>
          <p>VitalGrid</p>
        </div>
        <p class="tagline">Powering India’s Critical Care Network</p>
        <div class="hero-card">
          <div class="flex items-center justify-center mb-4">
            <span
              class="bg-blue-100 text-blue-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded uppercase tracking-wide"
              >Introducing</span
            >
          </div>
          <h1 class="platform-name">RaktaBridge</h1>
          <p class="platform-subtitle">
            Real-Time Healthcare Resource Intelligence Platform
          </p>
          <div class="w-full h-px bg-gray-200 my-6"></div>
          <div class="flex items-center justify-center gap-4 text-left">
            <div class="flex items-center gap-3">
              <div class="bg-red-100 p-3 rounded-full">
                <i class="fa-solid fa-droplet text-red-500 text-xl"></i>
              </div>
              <div>
                <p class="text-sm text-gray-500 font-semibold uppercase">
                  Starting With
                </p>
                <p class="text-lg font-bold text-gray-800">BloodLink</p>
              </div>
            </div>
            <div class="h-10 w-px bg-gray-300 mx-4"></div>
            <div>
              <p class="text-lg text-gray-600">
                India’s first real-time blood inventory network
              </p>
            </div>
          </div>
        </div>
      </div>
      <!-- Footer -->
      <div class="footer-bar">
        <div class="flex items-center gap-2">
          <i class="fa-regular fa-calendar"></i>
          <p>February 2026</p>
        </div>
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-globe"></i>
            <p>www.vitalgrid.in</p>
          </div>
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-envelope"></i>
            <p>contact@vitalgrid.in</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
